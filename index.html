<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    background: #0f172a;
    color: white;
    font-family: Arial;
}

.container {
    padding: 15px;
    padding-bottom: 80px;
}

/* ВЕРХНЯЯ ПАНЕЛЬ */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.balance {
    background: #22c55e;
    padding: 5px 10px;
    border-radius: 10px;
}

/* КАРТОЧКА */
.card {
    background: #1e293b;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    text-align: center;
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    color: white;
    font-size: 16px;
    width: 90%;
}

input {
    padding: 10px;
    width: 90%;
    border-radius: 10px;
    border: none;
    margin: 5px;
}

/* НИЖНЕЕ МЕНЮ */
.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #1e293b;
    display: flex;
}

.nav button {
    flex: 1;
    background: #334155;
    margin: 0;
}
</style>
</head>

<body>

<div class="container">

<!-- ВЕРХ -->
<div class="topbar">
    <h3>refCoin</h3>
    <div class="balance" id="coins">💰 0</div>
</div>

<!-- ГЛАВНАЯ -->
<div id="main">
    <div class="card">
        <p id="user"></p>
        <p id="rank"></p>

        <input id="text" placeholder="описание" />
        <input id="link" placeholder="https://t.me/..." />

        <button onclick="saveData()">Сохранить</button>
        <button onclick="openUserLink()">Открыть мою ссылку</button>

        <button onclick="buyTop()">🚀 Подняться в рейтинге (1 монета)</button>
    </div>
</div>

<!-- РЕЙТИНГ -->
<div id="rating" style="display:none">
    <div class="card">
        <h3>🏆 Рейтинг</h3>
        <div id="ratingList"></div>
    </div>
</div>

</div>

<!-- МЕНЮ -->
<div class="nav">
    <button onclick="show('main')">🏠</button>
    <button onclick="show('rating')">🏆</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let user = tg.initDataUnsafe.user;
let userId = user.id;

const API = "http://127.0.0.1:8000";

document.getElementById("user").innerText =
    "@" + (user.username || user.id);

// переключение экранов
function show(screen) {
    document.getElementById("main").style.display = "none";
    document.getElementById("rating").style.display = "none";

    document.getElementById(screen).style.display = "block";
}

// ЗАГРУЗКА ПОЛЬЗОВАТЕЛЯ
async function loadUser() {
    let res = await fetch(API + "/user/" + userId);
    let data = await res.json();

    document.getElementById("coins").innerText = "💰 " + data[0];
    document.getElementById("rank").innerText = "🏆 #" + data[1];

    document.getElementById("text").value = data[2] || "";
    document.getElementById("link").value = data[3] || "";
}

// СОХРАНЕНИЕ (ИСПРАВЛЕНО)
async function saveData() {
    let text = document.getElementById("text").value;
    let link = document.getElementById("link").value;

    await fetch(API + "/set_data/" + userId, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text: text, link: link})
    });

    alert("Сохранено");
    loadRating();
}

// ОТКРЫТЬ ССЫЛКУ
async function openUserLink() {
    let res = await fetch(API + "/user/" + userId);
    let data = await res.json();

    if (data[3]) {
        window.open(data[3]);
    } else {
        alert("Ссылка не задана");
    }
}

// ПОДНЯТЬСЯ
async function buyTop() {
    let res = await fetch(API + "/buy_top/" + userId, {method: "POST"});
    let data = await res.json();

    if (data.error) alert("Нет монет");
    else alert("Поднялся 🔥");

    loadUser();
    loadRating();
}

// РЕЙТИНГ (ИСПРАВЛЕНО)
async function loadRating() {
    let res = await fetch(API + "/rating");
    let data = await res.json();

    let html = "";

    data.forEach((u, i) => {
        let text = u[1] || "без описания";
        html += `${i+1}. ${text}<br>`;
    });

    document.getElementById("ratingList").innerHTML = html;
}

// загрузка
loadUser();
loadRating();
</script>

</body>
</html>
