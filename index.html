<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    background: #0f172a;
    color: white;
    font-family: Arial;
}

.container {
    padding: 15px;
    padding-bottom: 80px;
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    color: white;
    font-size: 16px;
    width: 90%;
}

input {
    padding: 10px;
    width: 90%;
    border-radius: 10px;
    border: none;
    margin: 5px;
}

.card {
    background: #1e293b;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    text-align: center;
}

.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #1e293b;
    display: flex;
}

.nav button {
    flex: 1;
    background: #334155;
    margin: 0;
}
</style>
</head>

<body>

<div class="container">

<h2>💰 refCoin</h2>

<!-- ГЛАВНАЯ -->
<div id="main">
    <div class="card">
        <p id="user"></p>
        <p id="coins"></p>
        <p id="rank"></p>

        <input id="text" placeholder="любой текст (описание)" />
        <input id="link" placeholder="ссылка (https://t.me/...)" />

        <button onclick="saveData()">Сохранить</button>

        <button onclick="openUserLink()">Перейти по моей ссылке</button>

        <button onclick="buyTop()">🚀 Подняться в рейтинге за 1 монету</button>
    </div>
</div>

<!-- РЕЙТИНГ -->
<div id="rating" style="display:none">
    <div class="card">
        <h3>🏆 Рейтинг</h3>
        <div id="ratingList"></div>
    </div>
</div>

<!-- ЗАРАБОТОК -->
<div id="tasks" style="display:none">
    <div class="card">
        <h3>💰 Заработок</h3>

        <button onclick="showTasks('channels')">📢 Каналы</button>
        <button onclick="showTasks('chats')">💬 Чаты</button>
        <button onclick="showTasks('bots')">🤖 Боты</button>

        <div id="tasksList"></div>
    </div>
</div>

</div>

<!-- НИЖНЕЕ МЕНЮ -->
<div class="nav">
    <button onclick="show('main')">🏠</button>
    <button onclick="show('rating')">🏆</button>
    <button onclick="show('tasks')">💰</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let user = tg.initDataUnsafe.user;
let userId = user.id;

const API = "http://127.0.0.1:8000";

document.getElementById("user").innerText =
    "@" + (user.username || user.id);

// переключение экранов
function show(screen) {
    document.getElementById("main").style.display = "none";
    document.getElementById("rating").style.display = "none";
    document.getElementById("tasks").style.display = "none";

    document.getElementById(screen).style.display = "block";
}

// загрузка пользователя
async function loadUser() {
    let res = await fetch(API + "/user/" + userId);
    let data = await res.json();

    document.getElementById("coins").innerText = "💰 Баланс: " + data[0];
    document.getElementById("rank").innerText = "🏆 Место: #" + data[1];
}

// сохранить текст + ссылку
async function saveData() {
    let text = document.getElementById("text").value;
    let link = document.getElementById("link").value;

    await fetch(API + "/set_link/" + userId, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text, link})
    });

    alert("Сохранено");
}

// открыть ссылку пользователя
async function openUserLink() {
    let res = await fetch(API + "/user/" + userId);
    let data = await res.json();

    if (data[2]) {
        window.open(data[2]);
    } else {
        alert("Нет ссылки");
    }
}

// подняться в рейтинге
async function buyTop() {
    let res = await fetch(API + "/buy_top/" + userId, {method: "POST"});
    let data = await res.json();

    if (data.error) alert("Нет монет");
    else alert("Ты поднялся 🔥");

    loadUser();
    loadRating();
}

// рейтинг
async function loadRating() {
    let res = await fetch(API + "/rating");
    let data = await res.json();

    let html = "";
    data.forEach((u, i) => {
        html += `${i+1}. ${u[1] || "без текста"}<br>`;
    });

    document.getElementById("ratingList").innerHTML = html;
}

// задания
function showTasks(type) {
    let html = "";

    if (type === "channels") {
        html = `<button onclick="task('https://t.me/refcoinXchannel')">Канал</button>`;
    }

    if (type === "chats") {
        html = `<button onclick="task('https://t.me/example_chat')">Чат</button>`;
    }

    if (type === "bots") {
        html = `<button onclick="task('https://t.me/example_bot')">Бот</button>`;
    }

    document.getElementById("tasksList").innerHTML = html;
}

function task(link) {
    window.open(link);
}

// проверка (начисление)
async function checkTask() {
    await fetch(API + "/earn/" + userId, {method: "POST"});
    alert("+1 refCoin");
    loadUser();
}

loadUser();
loadRating();
</script>

</body>
</html>
