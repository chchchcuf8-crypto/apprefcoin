<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    background: #0f172a;
    color: white;
    font-family: Arial;
}

.container {
    padding: 15px;
    padding-bottom: 80px;
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    color: white;
    font-size: 16px;
    width: 90%;
}

input {
    padding: 10px;
    width: 90%;
    border-radius: 10px;
    border: none;
    margin: 5px;
}

.card {
    background: #1e293b;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    text-align: center;
}

.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #1e293b;
    display: flex;
}

.nav button {
    flex: 1;
    background: #334155;
    margin: 0;
}
</style>
</head>

<body>

<div class="container">

<h2>💰 refCoin</h2>

<div id="main">
    <div class="card">
        <p id="user"></p>
        <p id="coins"></p>
        <p id="rank"></p>

        <input id="link" placeholder="твоя ссылка (tg)" />
        <button onclick="saveLink()">Сохранить ссылку</button>

        <button onclick="buyTop()">🔥 Стать #1 (1 refCoin)</button>
    </div>
</div>

<div id="rating" style="display:none">
    <div class="card">
        <h3>🏆 Рейтинг</h3>
        <div id="ratingList"></div>
    </div>
</div>

<div id="tasks" style="display:none">
    <div class="card">
        <h3>💰 Заработок</h3>

        <p>Подпишись на канал</p>

        <button onclick="openChannel()">Перейти</button>
        <button onclick="checkSub()">Проверить</button>
    </div>
</div>

</div>

<!-- НИЖНЕЕ МЕНЮ -->
<div class="nav">
    <button onclick="show('main')">🏠</button>
    <button onclick="show('rating')">🏆</button>
    <button onclick="show('tasks')">💰</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let user = tg.initDataUnsafe.user;
let userId = user.id;

const API = "http://127.0.0.1:8000";

document.getElementById("user").innerText =
    "@" + (user.username || user.id);

// переключение экранов
function show(screen) {
    document.getElementById("main").style.display = "none";
    document.getElementById("rating").style.display = "none";
    document.getElementById("tasks").style.display = "none";

    document.getElementById(screen).style.display = "block";
}

// загрузка пользователя
async function loadUser() {
    let res = await fetch(API + "/user/" + userId);
    let data = await res.json();

    document.getElementById("coins").innerText = "💰 Баланс: " + data[0];
    document.getElementById("rank").innerText = "🏆 Место: #" + data[1];
    document.getElementById("link").value = data[2];
}

// сохранить ссылку
async function saveLink() {
    let link = document.getElementById("link").value;

    await fetch(API + "/set_link/" + userId, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({link})
    });

    alert("Сохранено");
}

// купить топ (цена = 1)
async function buyTop() {
    let res = await fetch(API + "/buy_top/" + userId, {method: "POST"});
    let data = await res.json();

    if (data.error) alert("Нет монет");
    else alert("Ты теперь #1 🔥");

    loadUser();
    loadRating();
}

// рейтинг
async function loadRating() {
    let res = await fetch(API + "/rating");
    let data = await res.json();

    let html = "";
    data.forEach((u, i) => {
        html += `${i+1}. ${u[1] || "без ссылки"}<br>`;
    });

    document.getElementById("ratingList").innerHTML = html;
}

// перейти в канал
function openChannel() {
    window.open("https://t.me/refcoinXchannel");
}

// ПРОВЕРКА (теперь работает)
async function checkSub() {
    await fetch(API + "/earn/" + userId, {method: "POST"});
    alert("+1 refCoin начислен");
    loadUser();
}

loadUser();
loadRating();
</script>

</body>
</html>
