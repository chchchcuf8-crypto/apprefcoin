<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>
<h1>💰 refCoin</h1>

<p id="coins"></p>
<p id="rank"></p>

<button onclick="earn()">+1 refCoin</button>
<button onclick="buyTop()">Стать #1</button>

<h2>🏆 Рейтинг</h2>
<div id="rating"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let user = tg.initDataUnsafe.user;
let userId = user.id;

const API = "http://127.0.0.1:8000";

async function loadUser() {
    let res = await fetch(API + "/user/" + userId);
    let data = await res.json();

    document.getElementById("coins").innerText = "Монеты: " + data[0];
    document.getElementById("rank").innerText = "Место: " + data[1];
}

async function earn() {
    await fetch(API + "/earn/" + userId, {method: "POST"});
    loadUser();
}

async function buyTop() {
    await fetch(API + "/buy_top/" + userId, {method: "POST"});
    loadUser();
}

async function loadRating() {
    let res = await fetch(API + "/rating");
    let data = await res.json();

    let html = "";
    data.forEach((u, i) => {
        html += `${i+1}. ${u[0]} ${u[1]}<br>`;
    });

    document.getElementById("rating").innerHTML = html;
}

loadUser();
loadRating();
</script>
</body>
</html>
