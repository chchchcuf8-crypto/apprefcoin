<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
    margin: 0;
    background: #0f172a;
    color: white;
    font-family: Arial;
}

.container {
    padding: 15px;
    padding-bottom: 80px;
}

.topbar {
    display: flex;
    justify-content: space-between;
}

.balance {
    background: #22c55e;
    padding: 5px 10px;
    border-radius: 10px;
}

.card {
    background: #1e293b;
    padding: 10px;
    margin: 10px 0;
    border-radius: 10px;
    text-align: center;
}

button {
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: none;
    background: #22c55e;
    color: white;
    width: 90%;
}

input {
    padding: 10px;
    width: 90%;
    border-radius: 10px;
    border: none;
    margin: 5px;
}

.nav {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #1e293b;
    display: flex;
}

.nav button {
    flex: 1;
    background: #334155;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
    <h3>refCoin</h3>
    <div id="coins" class="balance">💰 0</div>
</div>

<!-- ГЛАВНАЯ -->
<div id="main">
    <div class="card">
        <p id="user"></p>
        <p id="rank"></p>

        <input id="text" placeholder="описание" />
        <input id="link" placeholder="https://t.me/..." />

        <button onclick="saveData()">Сохранить</button>
        <button onclick="openUserLink()">Открыть мою ссылку</button>
        <button onclick="buyTop()">🚀 Подняться (1 монета)</button>
    </div>
</div>

<!-- РЕЙТИНГ -->
<div id="rating" style="display:none">
    <div class="card">
        <h3>🏆 Рейтинг</h3>
        <div id="ratingList"></div>
    </div>
</div>

<!-- ЗАДАНИЯ -->
<div id="tasks" style="display:none">
    <div class="card">
        <h3>💰 Заработок</h3>

        <button onclick="showTasks('channels')">📢 Каналы</button>
        <button onclick="showTasks('chats')">💬 Чаты</button>
        <button onclick="showTasks('bots')">🤖 Боты</button>

        <div id="taskList"></div>
    </div>
</div>

</div>

<!-- МЕНЮ -->
<div class="nav">
    <button onclick="show('main')">🏠</button>
    <button onclick="show('rating')">🏆</button>
    <button onclick="show('tasks')">💰</button>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

let user = tg.initDataUnsafe.user;
let userId = user.id;

// ⚠️ ВАЖНО: если не работает — сервер не запущен
const API = "web-production-cb9bc.up.railway.app";

document.getElementById("user").innerText =
    "@" + (user.username || user.id);

// переключение
function show(screen) {
    ["main","rating","tasks"].forEach(id => {
        document.getElementById(id).style.display = "none";
    });
    document.getElementById(screen).style.display = "block";
}

// загрузка пользователя
async function loadUser() {
    let res = await fetch(API + "/user/" + userId);
    let data = await res.json();

    document.getElementById("coins").innerText = "💰 " + data[0];
    document.getElementById("rank").innerText = "🏆 #" + data[1];

    document.getElementById("text").value = data[2] || "";
    document.getElementById("link").value = data[3] || "";
}

// СОХРАНИТЬ
async function saveData() {
    let text = document.getElementById("text").value;
    let link = document.getElementById("link").value;

    await fetch(API + "/set_data/" + userId, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({text, link})
    });

    alert("Сохранено");
    loadRating();
}

// открыть ссылку
async function openUserLink() {
    let res = await fetch(API + "/user/" + userId);
    let data = await res.json();

    if (data[3]) window.open(data[3]);
    else alert("Нет ссылки");
}

// подняться
async function buyTop() {
    let res = await fetch(API + "/buy_top/" + userId, {method: "POST"});
    let data = await res.json();

    if (data.error) alert("Нет монет");
    else alert("Ты поднялся 🔥");

    loadUser();
    loadRating();
}

// рейтинг
async function loadRating() {
    let res = await fetch(API + "/rating");
    let data = await res.json();

    let html = "";

    data.forEach((u, i) => {
        let text = u[1] || "без описания";
        html += `${i+1}. ${text}<br>`;
    });

    document.getElementById("ratingList").innerHTML = html;
}

// задания
function showTasks(type) {
    let html = "";

    if (type === "channels") {
        html = `<button onclick="task('https://t.me/refcoinXchannel')">Перейти</button>
                <button onclick="checkTask()">Проверить</button>`;
    }

    if (type === "chats") {
        html = `<button onclick="task('https://t.me/example_chat')">Перейти</button>
                <button onclick="checkTask()">Проверить</button>`;
    }

    if (type === "bots") {
        html = `<button onclick="task('https://t.me/example_bot')">Перейти</button>
                <button onclick="checkTask()">Проверить</button>`;
    }

    document.getElementById("taskList").innerHTML = html;
}

// открыть задание
function task(link) {
    window.open(link);
}

// начисление
async function checkTask() {
    await fetch(API + "/earn/" + userId, {method: "POST"});
    alert("+1 монета");
    loadUser();
}

// запуск
loadUser();
loadRating();
</script>

</body>
</html>
